name: Update operational v0.8 accessible data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */3 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run PR-WX v0.8 update
        env:
          PRWX_NWS_USER_AGENT: ${{ secrets.PRWX_NWS_USER_AGENT }}
        run: python scripts/19_operational_update_v8.py --limit 12
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/processed/*.json || true
          git diff --cached --quiet || git commit -m "Update PR-WX v0.8 accessible data"
          git push || true
