name: CI Render FastAPI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Bootstrap Render files
        run: python scripts/render_bootstrap_v21.py

      - name: Run tests
        run: PYTHONPATH=src python -m pytest -q

      - name: Import FastAPI app
        run: python -c "from api.app import app; print(app.title)"
