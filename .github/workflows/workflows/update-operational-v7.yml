name: Update PR-WX v0.7 operational data

on:
  workflow_dispatch:
  schedule:
    - cron: '17 */3 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run v0.7 update
        env:
          PRWX_NWS_USER_AGENT: PR-WX-Hybrid-Model/0.7 github-actions@example.com
        run: python scripts/18_operational_update_v7.py
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/processed/*.json data/processed/*.geojson || true
          git commit -m "Update PR-WX v0.7 operational data" || echo "No changes"
          git push || true
