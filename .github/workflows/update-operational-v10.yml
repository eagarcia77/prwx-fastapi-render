name: Update PR-WX v1.0 temperature realtime data

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules cannot guarantee one-minute precision. Docker updater is recommended for 60-second refresh.
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run PR-WX v1.0 temperature realtime update
        env:
          PRWX_NWS_USER_AGENT: ${{ secrets.PRWX_NWS_USER_AGENT }}
        run: python scripts/21_operational_update_v10.py --limit 12
      - name: Commit generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/processed/*.csv data/processed/*.json || true
          git diff --cached --quiet || git commit -m "Update PR-WX v1.0 temperature realtime data"
          git push || true
