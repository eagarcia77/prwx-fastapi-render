services:
  - type: web
    name: prwx-fastapi
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt && pip install -e ."
    startCommand: "bash start_render_api.sh"
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: RUN_OPERATIONAL_UPDATE_ON_START
        value: "false"
      - key: PRWX_NWS_USER_AGENT
        value: "PR-WX-Hybrid-Model/2.3 render@example.com"
      - key: PRWX_PUBLIC_RENDER_URL
        value: "https://prwx-fastapi-render.onrender.com"
      - key: PRWX_ALLOWED_ORIGINS
        value: "https://eagarcia77.github.io,https://prwx-fastapi-render.onrender.com,http://localhost:8000,http://127.0.0.1:8000"
